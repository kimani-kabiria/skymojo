name: skymojo
description: A Weather and Sky View App
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.6.0
  intl: ^0.20.2
  flutter_spinkit: ^5.2.2
  curved_navigation_bar: ^1.0.6
  flutter_launcher_icons: ^0.14.1
  animated_splash_screen: ^1.3.0
  unicons: ^3.0.0
  get: ^4.7.3
  geolocator: ^14.0.2
  weather: ^3.1.1
  supabase_flutter: ^2.6.0
  google_sign_in: ^6.2.1
  flutter_map: ^6.1.0
  geocoding: ^2.1.1
  flutter_dotenv: ^5.1.0
  uuid: ^4.4.0
  fluttertoast: ^8.2.8
  # astronomy: ^0.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - .env
  fonts:
    - family: Bellota
      fonts:
        - asset: fonts/Bellota Text Bold.ttf